<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>دعوت نامه عروسی</title>
    <meta
      name="description"
      content="کارت دعوت عروسی تعاملی با تصویر خراش پذیر، آدرس قابل کلیک و اشتراک گذاری آسان"
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fa_IR" />
    <meta property="og:site_name" content="دعوت نامه عروسی" />
    <meta property="og:title" content="دعوت نامه عروسی فرناز و شهریار" />
    <meta
      property="og:description"
      content="با افتخار شما را به جشن عروسی فرناز و شهریار دعوت می کنیم"
    />
    <meta property="og:url" content="https://tafti.github.io/farnaz-wed-invitation/" />
    <meta
      property="og:image"
      content="https://tafti.github.io/farnaz-wed-invitation/assets/share-thumb.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1200" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="دعوت نامه عروسی فرناز و شهریار" />
    <meta
      name="twitter:description"
      content="با افتخار شما را به جشن عروسی فرناز و شهریار دعوت می کنیم"
    />
    <meta
      name="twitter:image"
      content="https://tafti.github.io/farnaz-wed-invitation/assets/share-thumb.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lalezar&family=Vazirmatn:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="intro-doors" aria-hidden="true">
      <div class="intro-door intro-door-left"></div>
      <div class="intro-door intro-door-right"></div>
      <div class="intro-door-title">دعوت عروسی</div>
    </div>

    <main class="page">
      <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
      <div class="bg-shape bg-shape-2" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>

      <section class="invite-card" aria-label="کارت دعوت عروسی">
        <p class="eyebrow">به همراه خانواده های گرامی</p>
        <h1 class="names"> فرناز  و شهریار</h1>
        <p class="date">دوشنبه ۲ شهریور ۱۴۰۵ • ساعت ۱۸:۳۰</p>

        <div class="scratch-wrap">
          <div class="reveal-photo" role="img" aria-label="تصویر عروس و داماد">
            <img src="shahriarwed.jpg" alt="تصویر عروس و داماد" />
            <canvas id="scratchCanvas" aria-hidden="true"></canvas>
          </div>
         
        </div>

        <div class="details">
          <p class="detail-title">محل برگزاری</p>
          <button id="addressBtn" class="venue-link address-open-btn" type="button" aria-haspopup="dialog">
            مشاهده آدرس مراسم
          </button>
          <p class="detail-note">برای دیدن نقشه و مسیر، روی آدرس بزنید</p>
        </div>

      </section>
    </main>

    <div id="addressModal" class="address-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-label="آدرس مراسم">
      <div class="address-modal-backdrop" data-close-address></div>
      <section class="address-modal-content">
        <button class="address-modal-close" type="button" data-close-address aria-label="بستن صفحه آدرس">×</button>
        <p class="eyebrow">آدرس مراسم</p>
        <h2 class="names">فرناز و شهریار</h2>
        <div class="address-image-wrap">
          <img src="address.jpg" alt="نقشه و QR آدرس مراسم" class="address-image" />
        </div>
        <a
          class="map-route-link"
          href="https://balad.ir/p/%D8%A8%D8%A7%D8%BA-%D8%B9%D9%85%D8%A7%D8%B1%D8%AA-%D9%85%D8%A7%D8%B1%DB%8C%D9%86%D8%A7_ceremonial-services-6sV43KszL1FpoL#15/35.67526/51.08919"
          target="_blank"
          rel="noopener noreferrer"
        >
          باز کردن مسیر در نقشه
        </a>
      </section>
    </div>

    <button id="muteBtn" class="mute-btn" type="button" aria-label="قطع یا وصل صدا">
      صدا: روشن
    </button>

    <audio
      id="weddingAudio"
      src="assets/wedding.mp3"
      loop
      preload="auto"
      playsinline
      webkit-playsinline
    ></audio>

    <script src="script.js"></script>
  </body>
</html>
