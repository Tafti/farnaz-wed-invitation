<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>آدرس مراسم</title>
    <meta name="description" content="آدرس و نقشه محل برگزاری مراسم" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lalezar&family=Vazirmatn:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
      <div class="bg-shape bg-shape-2" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>

      <section class="invite-card address-card" aria-label="صفحه آدرس">
        <p class="eyebrow">آدرس مراسم</p>
        <h1 class="names">فرناز و شهریار</h1>
        <p class="date">مسیریابی با اسکن QR یا دکمه پایین</p>

        <div class="address-image-wrap">
          <img src="address.jpg" alt="نقشه و QR آدرس مراسم" class="address-image" />
        </div>

        <div class="details">
          <p class="detail-title">لینک مسیر یابی</p>
          <a
            class="venue-link"
            href="https://balad.ir/p/%D8%A8%D8%A7%D8%BA-%D8%B9%D9%85%D8%A7%D8%B1%D8%AA-%D9%85%D8%A7%D8%B1%DB%8C%D9%86%D8%A7_ceremonial-services-6sV43KszL1FpoL#15/35.67526/51.08919"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="باز کردن لینک مسیر یابی"
          >
            باز کردن مسیر در نقشه
          </a>
          <p class="detail-note">این لینک از QR کد تصویر خوانده شده است</p>
        </div>

        <a class="back-link" href="index.html" aria-label="بازگشت به دعوت نامه">بازگشت به دعوت نامه</a>
      </section>
    </main>

    <button id="muteBtn" class="mute-btn" type="button" aria-label="قطع یا وصل صدا">
      صدا: روشن
    </button>

    <audio
      id="weddingAudio"
      src="assets/wedding.mp3"
      loop
      preload="auto"
      autoplay
      playsinline
      webkit-playsinline
    ></audio>

    <script src="script.js"></script>
  </body>
</html>
