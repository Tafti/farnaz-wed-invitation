<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>دعوت نامه عروسی</title>
    <meta
      name="description"
      content="کارت دعوت عروسی تعاملی با تصویر خراش پذیر، آدرس قابل کلیک و اشتراک گذاری آسان"
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fa_IR" />
    <meta property="og:site_name" content="دعوت نامه عروسی" />
    <meta property="og:title" content="دعوت نامه عروسی فرناز و شهریار" />
    <meta
      property="og:description"
      content="با افتخار شما را به جشن عروسی فرناز و شهریار دعوت می کنیم"
    />
    <meta property="og:url" content="https://tafti.github.io/farnaz-wed-invitation/" />
    <meta
      property="og:image"
      content="https://tafti.github.io/farnaz-wed-invitation/assets/share-thumb.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1200" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="دعوت نامه عروسی فرناز و شهریار" />
    <meta
      name="twitter:description"
      content="با افتخار شما را به جشن عروسی فرناز و شهریار دعوت می کنیم"
    />
    <meta
      name="twitter:image"
      content="https://tafti.github.io/farnaz-wed-invitation/assets/share-thumb.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lalezar&family=Vazirmatn:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
      <div class="bg-shape bg-shape-2" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>

      <section class="invite-card" aria-label="کارت دعوت عروسی">
        <p class="eyebrow">به همراه خانواده های گرامی</p>
        <h1 class="names">Feri CG  و شهریار</h1>
        <p class="date">شنبه ۲۸ شهریور ۱۴۰۵ • ساعت ۱۸:۳۰</p>

        <div class="scratch-wrap">
          <div class="reveal-photo" role="img" aria-label="تصویر عروس و داماد">
            <img src="assets/couple-fa.svg" alt="تصویر هنری عروس و داماد" />
            <canvas id="scratchCanvas" aria-hidden="true"></canvas>
          </div>
          <p class="scratch-hint" id="scratchHint">دایره را خراش دهید تا تصویر نمایان شود</p>
        </div>

        <div class="details">
          <p class="detail-title">محل برگزاری</p>
          <a
            class="venue-link"
            href="https://maps.google.com/?q=Tehran,+Grand+Garden+Hall"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="باز کردن موقعیت در نقشه"
          >
            تهران، گرند گاردن هال
          </a>
          <p class="detail-note">برای مسیر یابی روی آدرس بزنید</p>
        </div>

      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
